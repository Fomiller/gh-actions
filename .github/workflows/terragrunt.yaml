on:
  workflow_call:
    inputs:
      environment:
        required: false
        type: string
          
      doppler-project:
        required: true
        type: string
          
      download-artifacts:
        required: false 
        type: boolean
        default: false
          
      artifacts_dir:
        required: false 
        type: string
      
      tg-version:
        required: false
        type: string
        default: 1.1.0

      tg-destroy:
        required: false
        type: boolean
        default: false

      tg-plan:
        required: false
        type: boolean
        default: false

      tf-version:
        required: false
        type: string
        default: 1.9.8
            
      infra-dir:
        required: false
        type: string
        default: infra
            
      aws-default-region:
        required: false
        type: string
        default: us-east-1
      
      aws-default-output:
        required: false
        type: string
        default: json

      use-tailscale:
        required: false
        type: boolean
        default: false

      tailscale-tags:
        required: false
        type: string
        default: tag:ci


    secrets:
      # aws-access-key-id:
      #   required: true
      # aws-secret-access-key:
      #   required: true
      # aws-account-id:
      #   required: true
      # aws-deployer-role:
      #   required: true
      gmail_pass:
        required: false

jobs:
  Deploy-infra:
    if: ${{ (inputs.tg-plan == true || github.event.pull_request.merged == true || github.event_name == 'push') && needs.pre-check.outputs.should_skip != 'true' }}
    name: 'Deploy Infra'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
          
    steps:
    - name: Checkout
      uses: actions/checkout@v4
        
    - name: Download Lambda Artifacts
      uses: actions/download-artifact@v4
      continue-on-error: true
      if: ${{ (inputs.download-artifacts == true) }} 
      with:
        name: lambdas
        path: ${{inputs.artifacts_dir}}
          
    - name: Install Doppler
      uses: dopplerhq/cli-action@v2

    - name: Doppler Setup
      run: doppler setup -p ${{inputs.doppler-project}} -c ${{inputs.environment}}
      env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}

    # Needed when infra-dir targets nodes/services only reachable over the
    # tailnet (e.g. on-prem Talos nodes) rather than the public internet.
    # Reads TAILSCALE_GITHUB_ACTIONS_CLIENT_ID / TAILSCALE_GITHUB_ACTIONS_CLIENT_SECRET from Doppler instead
    # of GH Actions secrets so tailscale creds live in the same place as
    # everything else terragrunt/terraform pulls from.
    - name: Fetch Tailscale credentials from Doppler
      if: ${{ inputs.use-tailscale == true }}
      run: |
        TS_ID=$(doppler secrets get TAILSCALE_GITHUB_ACTIONS_CLIENT_ID --plain)
        TS_SECRET=$(doppler secrets get TAILSCALE_GITHUB_ACTIONS_CLIENT_SECRET --plain)
        echo "::add-mask::$TS_ID"
        echo "::add-mask::$TS_SECRET"
        echo "TAILSCALE_GITHUB_ACTIONS_CLIENT_ID=$TS_ID" >> "$GITHUB_ENV"
        echo "TAILSCALE_GITHUB_ACTIONS_CLIENT_SECRET=$TS_SECRET" >> "$GITHUB_ENV"

    - name: Connect to Tailscale
      if: ${{ inputs.use-tailscale == true }}
      uses: tailscale/github-action@v3
      with:
        oauth-client-id: ${{ env.TAILSCALE_GITHUB_ACTIONS_CLIENT_ID }}
        oauth-secret: ${{ env.TAILSCALE_GITHUB_ACTIONS_CLIENT_SECRET }}
        tags: ${{ inputs.tailscale-tags }}
        args: --accept-routes

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.AWS_DEPLOYER_ROLE }}
        aws-region: ${{ secrets.AWS_DEFAULT_REGION }}
        role-duration-seconds: 1200

    - name: Install Terraform ${{ inputs.tf-version }}
      uses: hashicorp/setup-Terraform@v2
      with:
        terraform_version: ${{ inputs.tf-version }}
        terraform_wrapper: false

    - name: Install Terragrunt ${{ inputs.tg-version }}
      run: |
        sudo wget -q -O /bin/terragrunt "https://github.com/gruntwork-io/terragrunt/releases/download/v${{ inputs.tg-version }}/terragrunt_linux_amd64"
        sudo chmod +x /bin/terragrunt

    - name: Install Just
      uses: extractions/setup-just@v1

    - name: Terragrunt Plan
      if: ${{ (inputs.tg-plan == true) }}
      continue-on-error: false
      run: |
        just infraDir=${{ inputs.infra-dir }} plan-all

    - name: Terragrunt Apply
      if: ${{ (inputs.tg-plan == false) && (inputs.tg-destroy == false) }}
      continue-on-error: false
      run: |
        just infraDir=${{ inputs.infra-dir }} apply-all

      # use if you need to debug workflow
    # - name: DEBUG
    #   uses: lhotari/action-upterm@v1
    #   with:
    #     limit-access-to-actor: true
    #     limit-access-to-users: Fomiller

    - name: Terragrunt Destroy
      if: ${{ (inputs.tg-plan == false) && (inputs.tg-destroy == true) }}
      continue-on-error: false
      run: |
        just infraDir=${{ inputs.infra-dir }} destroy-all
        
          
